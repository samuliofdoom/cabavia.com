<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CabAvia builds AI-first dispatch, pricing, and demand intelligence for airport transfer and chauffeur operators." />
    <meta name="theme-color" content="#050505" />
    <link rel="canonical" href="https://cabavia.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CabAvia" />
    <meta property="og:title" content="CabAvia | AI-First Mobility Intelligence" />
    <meta property="og:description" content="AI-first dispatch, pricing, and demand intelligence for modern transfer operators." />
    <meta property="og:url" content="https://cabavia.com/" />
    <meta property="og:image" content="https://cabavia.com/favicon.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CabAvia | AI-First Mobility Intelligence" />
    <meta name="twitter:description" content="AI-first dispatch, pricing, and demand intelligence for modern transfer operators." />
    <meta name="twitter:image" content="https://cabavia.com/favicon.svg" />

    <script>
      (function () {
        var origin = window.location.origin;
        if (!origin.endsWith('.pages.dev')) {
          return;
        }
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) {
          canonical.setAttribute('href', origin + '/');
        }
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) {
          ogUrl.setAttribute('content', origin + '/');
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <title>CabAvia | AI-First Mobility Intelligence</title>
  </head>
  <body class="bg-gray-950 text-gray-50 font-body antialiased selection:bg-neon-purple selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
